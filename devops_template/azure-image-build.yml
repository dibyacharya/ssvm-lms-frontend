parameters:
- name: containerRegistry
  type: string
- name: imageRepository
  type: string
- name: dockerfilePath
  type: string
- name: tag
  type: string

stages:
  - stage: Build
    variables:
      Build_ImageRepository: '${{ parameters.imageRepository }}'
      Build_Dockerfile: '${{ parameters.dockerfilePath }}'
    jobs:
      - job: 'printstageparameters'
        displayName: 'Print Stage Parameters'
        steps:
          - script: |
              echo "DEBUG (Build Stage): Parameters received by template:"
              echo "containerRegistry: ${{ parameters.containerRegistry }}"
              echo "imageRepository: ${{ parameters.imageRepository }}"
              echo "dockerfilePath: ${{ parameters.dockerfilePath }}"
              echo "tag: ${{ parameters.tag }}"
              echo ""
              echo "DEBUG (Build Stage): Stage-level variables derived from parameters:"
              echo "Build_ImageRepository: $(Build_ImageRepository)"
              echo "Build_Dockerfile: $(Build_Dockerfile)"
            displayName: 'Print Parameters and Stage Vars'
    
      - job: 'BuildDockerImage'
        displayName: 'Build Docker Image'
        steps:
          - script: |
              echo "DEBUG (Build Job): Variables used by Docker task:"
              echo "Dockerfile: $(Build_Dockerfile)"
              echo "repository: $(Build_ImageRepository)"
            displayName: 'Print Vars for Docker Task'

          - task: Docker@2
            displayName: 'Build Docker Image'
            inputs:
              command: build
              containerRegistry: 'svc_acr_connection'
              Dockerfile: '$(Build_Dockerfile)'
              repository: '$(Build_ImageRepository)'
              tags: |
                ${{ parameters.tag }}
                latest

          - task: Docker@2
            displayName: 'Push Docker Image'
            continueOnError: false
            inputs:
              command: push
              containerRegistry: 'svc_acr_connection'
              repository: '$(Build_ImageRepository)'
              tags: |
                ${{ parameters.tag }}
                latest
