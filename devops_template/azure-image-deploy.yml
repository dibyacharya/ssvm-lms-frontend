parameters:
  - name: tag
    type: string
  - name: imageRepository
    type: string
  - name: registry_name
    type: string
  - name: acrusername
    type: string
  - name: acrpassword
    type: string
  - name: containerapp_name
    type: string
  - name: google_api_key
    type: string
    default: ''
  - name: groq_api_key
    type: string
    default: ''
  - name: resource_group
    type: string
  - name: containerapp_environment
    type: string
  - name: env
    type: string

steps:

  - script: |
      echo "DEBUG (Build Job): Variables used by Docker task:"
      echo "repository: ${{ parameters.imageRepository }}"
      echo "containerapp_name: ${{ parameters.containerapp_name }}"
      echo "container_environment: ${{ parameters.containerapp_environment }}"
    displayName: 'Print Vars for Docker Task'

  - task: AzureCLI@2
    displayName: 'Deploy Container App using Azure CLI'
    inputs:
      azureSubscription: 'subs_connection'
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        az account set --subscription 8252c205-6329-476f-83e9-97264014e82a
        echo "Logging into ACR..."
        echo "${{ parameters.acrpassword }}" | docker login \
          ${{ parameters.registry_name }}.azurecr.io \
          -u ${{ parameters.acrusername }} \
          --password-stdin

        echo "==== ENVIRONMENT VARS ===="
        echo "repository: ${{ parameters.imageRepository }}"
        echo "containerapp_name: ${{ parameters.containerapp_name }}"
        echo "resource_group: rg-kiit-lms-${{ parameters.env }}"
        echo "containerapp_environment: ${{ parameters.containerapp_environment }}"
        echo "env: ${{ parameters.env }}"
        echo "==========================="

        RESOURCE_GROUP="rg-kiit-lms-${{ parameters.env }}"
        ENVIRONMENT="${{ parameters.containerapp_environment }}"

        echo "Deploying container app..."

        if az containerapp show \
            --name "${{ parameters.containerapp_name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --only-show-errors &>/dev/null; then

          echo "Container app exists. Updating..."

          az containerapp update \
            --name "${{ parameters.containerapp_name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ parameters.registry_name }}.azurecr.io/${{ parameters.imageRepository }}:${{ parameters.tag }}"

        else

          echo "Container app does not exist. Creating..."
          echo "DEBUG → environment = $ENVIRONMENT"

          az containerapp create \
            --name "${{ parameters.containerapp_name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --environment "$ENVIRONMENT" \
            --image "${{ parameters.registry_name }}.azurecr.io/${{ parameters.imageRepository }}:${{ parameters.tag }}" \
            --ingress external \
            --target-port 8000 \
            --registry-server "${{ parameters.registry_name }}.azurecr.io" \
            --registry-username "${{ parameters.acrusername }}" \
            --registry-password "${{ parameters.acrpassword }}"

        fi

        echo "Container app deployment completed."
